baseURL = "https://stack.airatvaliullin.com/"
title = "Dev Playbook"
copyright = "© Airat Valiullin"
languageCode = "en-us"
enableRobotsTXT = true
enableGitInfo = true
pluralizeListTitles = false
mainSections = ["development", "tools", "misc"]

theme = "hugo-neso"

[outputFormats.Raw]
  mediaType = "text/markdown"
  baseName = "raw"
  isPlainText = true
  notAlternative = true

[outputs]
  home = ["html", "rss", "json"]
  page = ["html", "Raw"]
  section = ["html", "rss", "Raw"]

[minify]
  minifyOutput = true

# Tailwind integration (required by Neso)
[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'

[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'

[markup]
  [markup.goldmark]
    [markup.goldmark.parser]
      wrapStandAloneImageWithinParagraph = false
      [markup.goldmark.parser.attribute]
        block = true
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

[params]
  [params.neso]
    time_format = "2006-01-02"
    show_breadcrumbs = true
    ext_link_indicator = true
    [params.neso.branding]
      logo_text = "Stack"
    [params.neso.home]
      display_mode = "intro"
    [params.neso.page]
      show_breadcrumbs = true
      show_toc = true
      show_prev_next = false
    [params.neso.seo]
      site_description = "Opinionated how-to guides and reference pages for my dev stack."
      site_keywords = ["Development", "Tools", "Misc"]
      site_author = ["Airat Valiullin"]
